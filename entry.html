<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กรอกข้อมูลเรื่องร้องเรียน — ศูนย์ดำรงธรรมหนองบัวลำภู</title>
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png?v=4">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png?v=4">
<link rel="apple-touch-icon" href="./apple-touch-icon.png?v=4">
<link rel="manifest" href="manifest.json?v=4">
<meta name="theme-color" content="#16325c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ดำรงธรรม นภ.">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#16325c;--indigo:#24508f;--gold:#c9a227;--green:#1f9d6b;--amber:#e0a000;--red:#d64545;
  --ink:#1f2733;--muted:#6b7686;--line:#e6eaf1;--bg:#eef1f8;--card:#fff;--shadow:0 8px 26px rgba(22,50,92,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink)}
h1,h2,h3,.k{font-family:'Kanit',sans-serif}
.top{background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;padding:18px 22px;display:flex;align-items:center;gap:14px}
.backdash{margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);color:#fff;font:500 13px 'Kanit';padding:8px 15px;border-radius:9px;white-space:nowrap;text-decoration:none}
.backdash:hover{background:rgba(255,255,255,.28)}
.seal{width:48px;height:48px;border-radius:50%;background:#fff;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.seal img{width:100%;height:100%;object-fit:contain;padding:2px}
.top h1{font-size:18px;font-weight:600}.top .s{font-size:12.5px;opacity:.85;font-weight:300}
.wrap{max-width:980px;margin:22px auto;padding:0 18px}

/* PIN GATE */
#gate{max-width:340px;margin:60px auto;background:var(--card);border-radius:18px;padding:30px 26px;box-shadow:var(--shadow);text-align:center}
#gate h2{color:var(--navy);font-size:20px;margin-bottom:6px}
#gate p{color:var(--muted);font-size:13px;margin-bottom:18px}
.pindots{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pindot{width:15px;height:15px;border-radius:50%;border:2px solid var(--indigo)}
.pindot.on{background:var(--indigo)}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.key{padding:16px;font:600 20px 'Kanit';background:#f3f6fc;border:1px solid var(--line);border-radius:13px;cursor:pointer;color:var(--navy);transition:.15s}
.key:hover{background:#e7eefb}.key:active{transform:scale(.95)}
.key.act{background:var(--navy);color:#fff}
.gate-err{color:var(--red);font-size:13px;min-height:18px;margin-top:12px}

/* APP */
#app{display:none}
.bar{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:18px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.bar label{font:500 14px 'Kanit';color:var(--navy)}
select,input,textarea{font-family:'Sarabun';font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);outline:none;width:100%}
select:focus,input:focus,textarea:focus{border-color:var(--indigo)}
.bar select{width:auto;min-width:200px}
.btn{font:500 14px 'Kanit';padding:10px 18px;border:none;border-radius:10px;cursor:pointer;color:#fff;background:var(--indigo);transition:.15s}
.btn:hover{filter:brightness(1.06)}.btn:active{transform:scale(.97)}
.btn.gold{background:var(--gold)}.btn.ghost{background:#eef2fb;color:var(--navy)}.btn.red{background:var(--red)}
.btn.sm{padding:6px 12px;font-size:12.5px}
.ml{margin-left:auto}

.card{background:var(--card);border-radius:14px;padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.card h3{color:var(--navy);font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:2px}
.field.full{grid-column:1/-1}
.field label{font-size:13px;color:var(--muted);font-weight:500}
.field .req{color:var(--red)}
textarea{min-height:80px;resize:vertical}
.form-actions{display:flex;gap:10px;margin-top:8px}

.list-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.list-head h3{margin:0}
.search{max-width:260px}
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f3f6fc;color:var(--navy);font:500 13px 'Kanit';text-align:left;padding:10px;white-space:nowrap;border-bottom:2px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tr:hover td{background:#f8faff}
.st{font:500 11px 'Kanit';padding:2px 9px;border-radius:20px;white-space:nowrap}
.st.done{background:#e3f5ec;color:var(--green)}.st.prog{background:#fdf3df;color:#b07d00}
.actbtns{display:flex;gap:6px}
.iconbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 9px;cursor:pointer;font-size:12px}
.iconbtn.e:hover{border-color:var(--indigo);color:var(--indigo)}
.iconbtn.d:hover{border-color:var(--red);color:var(--red)}
.muted{color:var(--muted);font-size:12.5px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:13px 22px;border-radius:30px;font:500 14px 'Kanit';box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:50}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--red)}.toast.ok{background:var(--green)}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{padding:26px;text-align:center;color:var(--muted)}
.tablewrap{-webkit-overflow-scrolling:touch}
table{min-width:520px}
@media(max-width:1024px){.wrap{padding:0 16px}.grid{grid-template-columns:1fr 1fr}}
@media(max-width:680px){
  .top{padding:14px 16px;gap:10px}
  .seal{width:42px;height:42px}
  .top h1{font-size:16px}.top .s{font-size:11px}
  .backdash{padding:8px 12px;font-size:12.5px}
  .wrap{margin:16px auto;padding:0 14px}
  .grid{grid-template-columns:1fr}
  .bar{flex-direction:column;align-items:stretch}
  .bar select,.bar .ml{width:100%;margin-left:0}
  .bar label{margin-bottom:-4px}
  .btn{padding:12px 18px;font-size:15px}
  .form-actions{flex-direction:column}
  .form-actions .btn{width:100%}
  .list-head{flex-wrap:wrap}.search{max-width:100%;width:100%}
  select,input,textarea{font-size:16px;padding:12px}
  #gate{margin:30px auto;max-width:92%}
  .key{padding:18px;font-size:22px}
  .card{padding:16px}
}
</style>
</head>
<body>

<div class="top">
  <div class="seal"><img src="./seal.png?v=4" alt="ตราจังหวัดหนองบัวลำภู"></div>
  <div class="topwrap"><h1>ระบบกรอกข้อมูลเรื่องร้องเรียน</h1><div class="s">ศูนย์ดำรงธรรมจังหวัดหนองบัวลำภู · ปีงบประมาณ 2569</div></div>
  <a class="backdash" href="index.html">← แดชบอร์ด</a>
</div>

<!-- PIN GATE -->
<div id="gate">
  <h2>เข้าสู่ระบบ</h2>
  <p>กรอกรหัส PIN 6 หลักเพื่อกรอก/แก้ไขข้อมูล</p>
  <div class="pindots" id="dots"></div>
  <div class="keys" id="keys"></div>
  <div class="gate-err" id="gateErr"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="wrap">
    <div class="bar">
      <label>เลือกชุดข้อมูล:</label>
      <select id="selSheet"></select>
      <button class="btn ghost ml sm" onclick="resetForm()">+ เพิ่มเรื่องใหม่</button>
      <button class="btn ghost sm" onclick="logout()">ออกจากระบบ</button>
    </div>

    <!-- FORM -->
    <div class="card">
      <h3 id="formTitle">➕ เพิ่มเรื่องร้องเรียนใหม่</h3>
      <input type="hidden" id="editRow" value="">
      <div class="grid" id="formGrid"><!-- fields injected --></div>
      <div class="form-actions">
        <button class="btn gold" id="saveBtn" onclick="save()">บันทึกลงชีต</button>
        <button class="btn ghost" onclick="resetForm()">ล้างฟอร์ม</button>
      </div>
    </div>

    <!-- LIST -->
    <div class="card">
      <div class="list-head">
        <h3>📋 รายการในชีต</h3>
        <input class="search ml" id="search" placeholder="🔍 ค้นหา...">
        <button class="btn ghost sm" onclick="loadList()">รีเฟรช</button>
      </div>
      <div class="tablewrap"><table id="tbl"><thead></thead><tbody></tbody></table></div>
      <div class="muted" id="cnt" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====== ตั้งค่า: วาง URL /exec ของ Web app ที่ deploy ====== */
const API = 'https://script.google.com/macros/s/AKfycby_DgqQHA42cvJzfrsiKMtfuki3ctC1b3xhH9QUOwek-DMz1C1Xqv9VRhnwMyB8Ol98/exec';

/* ====== schema ฟอร์ม ====== */
const DISTRICTS = ['เมืองหนองบัวลำภู','ศรีบุญเรือง','นากลาง','โนนสัง','สุวรรณคูหา','นาวัง'];
const CONSUMER = 'คุ้มครองผู้บริโภค';
const TYPES = ['ขอความช่วยเหลือ','กล่าวโทษเจ้าหน้าที่รัฐ','ปัญหาความเดือดร้อน','ปัญหาที่ดิน','แจ้งเบาะแส','หนี้นอกระบบ','ทูลเกล้าถวายฎีกา'];
const CHANNELS = ['ด้วยตนเอง','จดหมาย','สปน.1111','สื่อโซเชียล','ศดธ.มท.','จากหน่วยงานอื่น','ไปรษณีย์อิเล็กทรอนิกส์'];
const STATUSES = ['อยู่ระหว่างดำเนินการ','ยุติแล้ว'];

// field config: [key, label, type, required]
const DIST_FIELDS = [
  ['ชื่อเรื่อง','ชื่อเรื่อง','text',true],
  ['ผู้ร้องเรียน','ผู้ร้องเรียน','text',false],
  ['ผู้ถูกร้องเรียน','ผู้ถูกร้องเรียน','text',false],
  ['ประเภท','ประเภท','select-type',true],
  ['วันที่ร้องเรียน','วันที่ร้องเรียน','date',false],
  ['กำหนดรายงาน','กำหนดรายงาน','date',false],
  ['ช่องทาง','ช่องทาง','select-channel',false],
  ['หน่วยงานรับผิดชอบ','หน่วยงานรับผิดชอบ','text',false],
  ['สถานะ','สถานะ','select-status',true],
  ['การเร่งรัด','การเร่งรัด','text',false],
  ['รายละเอียด','รายละเอียด','textarea',false]
];
const CONS_FIELDS = [
  ['ชื่อเรื่อง','ชื่อเรื่อง','text',true],
  ['ผู้ร้องเรียน','ผู้ร้องเรียน','text',false],
  ['ผู้ถูกร้องเรียน','ผู้ถูกร้องเรียน','text',false],
  ['วันที่ร้องเรียน','วันที่ร้องเรียน','date',false],
  ['กำหนดรายงาน','กำหนดรายงาน','date',false],
  ['สถานะ','สถานะ','select-status',true],
  ['หมายเหตุ','หมายเหตุ','text',false],
  ['รายละเอียด','รายละเอียด','textarea',false]
];

let PIN = '';
let currentSheet = DISTRICTS[0];
let listData = [];

/* ====== PIN GATE ====== */
const dotsEl=document.getElementById('dots'), keysEl=document.getElementById('keys');
for(let i=0;i<6;i++){const d=document.createElement('div');d.className='pindot';dotsEl.appendChild(d);}
let pinBuf='';
['1','2','3','4','5','6','7','8','9','⌫','0','✓'].forEach(k=>{
  const b=document.createElement('div');b.className='key';b.textContent=k;
  b.onclick=()=>pinPress(k);keysEl.appendChild(b);
});
function pinPress(k){
  if(k==='⌫'){pinBuf=pinBuf.slice(0,-1);}
  else if(k==='✓'){return submitPin();}
  else if(pinBuf.length<6){pinBuf+=k;}
  [...dotsEl.children].forEach((d,i)=>d.classList.toggle('on',i<pinBuf.length));
  if(pinBuf.length===6) submitPin();
}
async function submitPin(){
  if(pinBuf.length<6){document.getElementById('gateErr').textContent='กรอกให้ครบ 6 หลัก';return;}
  const err=document.getElementById('gateErr');
  err.style.color='var(--muted)';err.textContent='กำลังตรวจสอบรหัส...';
  try{
    const r=await jsonp({action:'checkpin',pin:pinBuf});
    if(!r.ok) throw (r.error||'PIN ไม่ถูกต้อง');
    PIN=pinBuf;
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }catch(e){
    err.style.color='var(--red)';err.textContent='✕ '+e;
    pinBuf='';[...dotsEl.children].forEach(d=>d.classList.remove('on'));
  }
}
function logout(){location.reload();}

/* ====== JSONP ====== */
function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+Math.floor(Math.random()*9999);
    const url=API+'?'+Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&')+'&callback='+cb;
    const s=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject('หมดเวลา');},20000);
    function cleanup(){clearTimeout(timer);delete window[cb];s.remove();}
    window[cb]=d=>{cleanup();resolve(d);};
    s.onerror=()=>{cleanup();reject('เชื่อมต่อไม่ได้');};
    s.src=url;document.body.appendChild(s);
  });
}

/* ====== APP ====== */
function initApp(){
  const sel=document.getElementById('selSheet');
  [...DISTRICTS, CONSUMER].forEach(n=>sel.add(new Option(n===CONSUMER?'⚖️ '+n:n, n)));
  sel.value=currentSheet;
  sel.onchange=()=>{currentSheet=sel.value;resetForm();buildForm();loadList();};
  document.getElementById('search').oninput=renderList;
  buildForm();loadList();
}

function fields(){ return currentSheet===CONSUMER ? CONS_FIELDS : DIST_FIELDS; }

function buildForm(){
  const g=document.getElementById('formGrid');g.innerHTML='';
  fields().forEach(([key,label,type,req])=>{
    const wrap=document.createElement('div');
    wrap.className='field'+(type==='textarea'?' full':'');
    let ctrl='';
    const id='f_'+key;
    if(type==='textarea') ctrl=`<textarea id="${id}"></textarea>`;
    else if(type==='date') ctrl=`<input type="date" id="${id}">`;
    else if(type==='select-type') ctrl=sel(id,TYPES);
    else if(type==='select-channel') ctrl=sel(id,CHANNELS,true);
    else if(type==='select-status') ctrl=sel(id,STATUSES);
    else ctrl=`<input type="text" id="${id}">`;
    wrap.innerHTML=`<label>${label} ${req?'<span class="req">*</span>':''}</label>${ctrl}`;
    g.appendChild(wrap);
  });
}
function sel(id,arr,blank){
  return `<select id="${id}">${blank?'<option value=""></option>':''}${arr.map(o=>`<option>${o}</option>`).join('')}</select>`;
}

function resetForm(){
  document.getElementById('editRow').value='';
  document.getElementById('formTitle').textContent='➕ เพิ่มเรื่องร้องเรียนใหม่';
  document.getElementById('saveBtn').textContent='บันทึกลงชีต';
  fields().forEach(([key])=>{const el=document.getElementById('f_'+key);if(el)el.value='';});
}

/* date helpers: BE(dd/mm/พ.ศ.) <-> input(yyyy-mm-dd ค.ศ.) */
function be2input(s){
  if(!s) return '';const p=String(s).split('/');if(p.length!==3)return '';
  const d=p[0].padStart(2,'0'),m=p[1].padStart(2,'0'),y=(+p[2]-543);
  return y+'-'+m+'-'+d;
}
function input2be(s){
  if(!s) return '';const p=s.split('-');if(p.length!==3)return '';
  return (+p[2])+'/'+(+p[1])+'/'+(+p[0]+543);
}

async function loadList(){
  document.querySelector('#tbl tbody').innerHTML='<tr><td class="empty">กำลังโหลด...</td></tr>';
  try{
    const r=await jsonp({action:'list',sheet:currentSheet});
    if(!r.ok) throw r.error;
    listData=r.rows;renderList();
  }catch(e){toast('โหลดไม่สำเร็จ: '+e,'err');}
}

function renderList(){
  const q=document.getElementById('search').value.trim();
  const isCons=currentSheet===CONSUMER;
  const rows=listData.filter(o=>!q||JSON.stringify(o).includes(q));
  const head=isCons
    ? ['ชื่อเรื่อง','ผู้ร้องเรียน','วันที่ร้องเรียน','กำหนดรายงาน','สถานะ','']
    : ['ที่','ชื่อเรื่อง','ผู้ร้องเรียน','ประเภท','กำหนดรายงาน','สถานะ',''];
  document.querySelector('#tbl thead').innerHTML='<tr>'+head.map(h=>`<th>${h}</th>`).join('')+'</tr>';
  const tb=document.querySelector('#tbl tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="7" class="empty">ยังไม่มีข้อมูล</td></tr>';document.getElementById('cnt').textContent='';return;}
  tb.innerHTML=rows.map(o=>{
    const st=o['สถานะ']==='ยุติแล้ว'?'done':'prog';
    const stTd=`<span class="st ${st}">${o['สถานะ']||'-'}</span>`;
    const act=`<div class="actbtns">
      <button class="iconbtn e" onclick='editRow(${o._row})'>แก้ไข</button>
      <button class="iconbtn d" onclick='delRow(${o._row})'>ลบ</button></div>`;
    const cells = isCons
      ? [o['ชื่อเรื่อง'],o['ผู้ร้องเรียน'],o['วันที่ร้องเรียน'],o['กำหนดรายงาน'],stTd,act]
      : [o['ที่'],o['ชื่อเรื่อง'],o['ผู้ร้องเรียน'],o['ประเภท'],o['กำหนดรายงาน'],stTd,act];
    return '<tr>'+cells.map(c=>`<td>${c||''}</td>`).join('')+'</tr>';
  }).join('');
  document.getElementById('cnt').textContent=`ทั้งหมด ${rows.length} เรื่อง`;
}

function editRow(row){
  const o=listData.find(x=>x._row===row);if(!o)return;
  document.getElementById('editRow').value=row;
  document.getElementById('formTitle').textContent='✏️ แก้ไขเรื่อง (แถว '+row+')';
  document.getElementById('saveBtn').textContent='บันทึกการแก้ไข';
  fields().forEach(([key,,type])=>{
    const el=document.getElementById('f_'+key);if(!el)return;
    el.value = type==='date' ? be2input(o[key]) : (o[key]||'');
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

async function delRow(row){
  if(!confirm('ยืนยันลบเรื่องในแถว '+row+' ?'))return;
  try{
    const r=await jsonp({action:'delete',sheet:currentSheet,row,pin:PIN});
    if(!r.ok)throw r.error;
    toast('ลบเรียบร้อย','ok');loadList();
  }catch(e){toast('ลบไม่สำเร็จ: '+e,'err');}
}

async function save(){
  const editRow=document.getElementById('editRow').value;
  const params={action:editRow?'edit':'add',sheet:currentSheet,pin:PIN};
  if(editRow)params.row=editRow;
  let missing=null;
  fields().forEach(([key,label,type,req])=>{
    let v=document.getElementById('f_'+key).value;
    if(type==='date')v=input2be(v);
    if(req&&!v)missing=label;
    params[key]=v;
  });
  if(missing){toast('กรุณากรอก: '+missing,'err');return;}
  const btn=document.getElementById('saveBtn');const old=btn.textContent;
  btn.innerHTML='<span class="spin"></span> กำลังบันทึก';btn.disabled=true;
  try{
    const r=await jsonp(params);
    if(!r.ok)throw r.error;
    toast(editRow?'แก้ไขเรียบร้อย ✓':'บันทึกลงชีตเรียบร้อย ✓','ok');
    resetForm();loadList();
  }catch(e){toast('บันทึกไม่สำเร็จ: '+e,'err');}
  finally{btn.textContent=old;btn.disabled=false;}
}

function toast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',2600);
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
