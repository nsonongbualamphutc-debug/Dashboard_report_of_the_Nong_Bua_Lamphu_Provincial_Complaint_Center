<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศูนย์ดำรงธรรมจังหวัดหนองบัวลำภู — ระบบติดตามงานเรื่องร้องเรียน</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#16325c;--navy2:#1e426f;--indigo:#24508f;--gold:#c9a227;
  --green:#1f9d6b;--amber:#e0a000;--red:#d64545;--purple:#7c4dff;
  --ink:#1f2733;--muted:#6b7686;--line:#e6eaf1;--bg:#eef1f8;--card:#fff;
  --shadow:0 10px 30px rgba(22,50,92,.08);--shadow-sm:0 4px 14px rgba(22,50,92,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.kanit{font-family:'Kanit',sans-serif;font-weight:600}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;position:sticky;top:0;z-index:40;box-shadow:0 2px 14px rgba(22,50,92,.25)}
.nav-top{max-width:1240px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.seal{width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#f3e8c4);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--gold)}
.seal span{font:700 11px 'Kanit';color:var(--navy);text-align:center;line-height:1.05}
.brand h1{font-size:18px;font-weight:600}.brand .s{font-size:12px;opacity:.85;font-weight:300}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.status{font-size:12px;opacity:.9;text-align:right;font-weight:300}
.status b{font-weight:500}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#5fe6a0;margin-right:5px;animation:pulse 1.6s infinite}
.live-dot.err{background:#ff7a7a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font:500 13px 'Kanit';padding:8px 14px;border-radius:9px;cursor:pointer;transition:.2s}
.refresh:hover{background:rgba(255,255,255,.28)}
.entrybtn{background:var(--gold);border:1px solid var(--gold);color:#3a2e07;font:600 13px 'Kanit';padding:8px 16px;border-radius:9px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.entrybtn:hover{filter:brightness(1.06)}
.menu{background:var(--navy2)}
.menu-inner{max-width:1240px;margin:0 auto;padding:0 24px;display:flex;gap:2px;overflow-x:auto}
.menu a{color:#cdd8ec;font:500 14.5px 'Kanit';padding:13px 18px;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s;display:flex;align-items:center;gap:7px}
.menu a:hover{color:#fff}.menu a.active{color:#fff;border-bottom-color:var(--gold)}

.wrap{max-width:1240px;margin:0 auto;padding:26px 24px 60px}
.banner{background:#fff4f4;border:1px solid #f3d0d0;color:#a23a3a;padding:11px 16px;border-radius:10px;font-size:13.5px;margin-bottom:18px;display:none}

/* generic */
.crumb{font-size:13px;color:var(--muted);margin-bottom:16px}
.crumb a{color:var(--indigo);font-weight:500}
.page-title{font-size:22px;color:var(--navy);margin-bottom:4px}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:22px}
.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.card h3{font-size:16px;color:var(--navy);margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:22px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.chart-box{position:relative;height:280px}.chart-box.sm{height:230px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;border:1px solid var(--line)}
.kpi::after{content:"";position:absolute;right:-20px;top:-20px;width:90px;height:90px;border-radius:50%;opacity:.08}
.kpi.k1::after{background:var(--navy)}.kpi.k2::after{background:var(--green)}.kpi.k3::after{background:var(--amber)}.kpi.k4::after{background:var(--red)}
.kpi .lab{font-size:13.5px;color:var(--muted);font-weight:500}
.kpi .num{font-family:'Kanit';font-weight:700;font-size:38px;line-height:1.1;margin-top:4px}
.kpi.k1 .num{color:var(--navy)}.kpi.k2 .num{color:var(--green)}.kpi.k3 .num{color:var(--amber)}.kpi.k4 .num{color:var(--red)}
.kpi .foot{font-size:12px;color:var(--muted);margin-top:3px}

/* nav cards (home) */
.navcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.navcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.2s;box-shadow:var(--shadow-sm);display:flex;gap:14px;align-items:center}
.navcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#cfd9ec}
.navcard .ic{width:46px;height:46px;border-radius:12px;background:#eef2fb;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.navcard .t{font:600 15px 'Kanit';color:var(--navy)}
.navcard .d{font-size:12.5px;color:var(--muted)}

/* list */
.minilist{display:flex;flex-direction:column;gap:8px;max-height:330px;overflow-y:auto}
.li{display:flex;gap:12px;align-items:flex-start;padding:11px 13px;background:#fff;border:1px solid var(--line);border-radius:11px;cursor:pointer;transition:.15s}
.li:hover{border-color:var(--indigo);background:#f8faff}
.li .badge{flex-shrink:0;font:600 11px 'Kanit';padding:3px 9px;border-radius:20px}
.badge.over{background:#fde8e8;color:var(--red)}.badge.near{background:#fdf3df;color:#b07d00}
.badge.done{background:#e3f5ec;color:var(--green)}.badge.new{background:#eaf0fb;color:var(--indigo)}
.li .t{font-size:13.5px;font-weight:500;line-height:1.35}
.li .m{font-size:12px;color:var(--muted);margin-top:2px}

/* filters + table */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.filters select,.filters input{font-family:'Sarabun';font-size:13.5px;padding:9px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;outline:none}
.filters input{flex:1;min-width:200px}
.filters select:focus,.filters input:focus{border-color:var(--indigo)}
.table-wrap{background:var(--card);border-radius:14px;border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f3f6fc;color:var(--navy);font:500 13px 'Kanit';text-align:left;padding:12px;position:sticky;top:0;white-space:nowrap;border-bottom:2px solid var(--line)}
tbody td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr{cursor:pointer;transition:.12s}tbody tr:hover{background:#f8faff}
.ttl{font-weight:500;max-width:340px}
.st{display:inline-block;font:500 11.5px 'Kanit';padding:3px 10px;border-radius:20px;white-space:nowrap}
.st.done{background:#e3f5ec;color:var(--green)}.st.prog{background:#fdf3df;color:#b07d00}
.dl{font-weight:600;white-space:nowrap}.dl.over{color:var(--red)}.dl.near{color:#b07d00}.dl.ok{color:var(--muted);font-weight:400}
.scroll{max-height:600px;overflow:auto}.empty{padding:34px;text-align:center;color:var(--muted)}
.note{font-size:12.5px;color:var(--muted);margin-top:14px;padding:12px 15px;background:#f3f6fc;border-radius:10px;border-left:3px solid var(--gold)}

/* district cards */
.dcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:22px}
.dcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.2s}
.dcard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.dcard h4{font-size:16px;color:var(--navy);margin-bottom:10px}
.dcard .big{font:700 32px 'Kanit';color:var(--navy)}
.bar{height:8px;border-radius:5px;background:#eef1f7;overflow:hidden;display:flex;margin:10px 0 6px}
.bar .seg.done{background:var(--green)}.bar .seg.prog{background:var(--amber)}
.dcard .legend{font-size:12px;color:var(--muted);display:flex;gap:14px}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px}.dot.done{background:var(--green)}.dot.prog{background:var(--amber)}

/* DETAIL PAGE */
.detail-head{background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;border-radius:18px;padding:26px 28px;margin-bottom:20px;box-shadow:var(--shadow)}
.detail-head .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tag{font:500 12px 'Kanit';padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.18)}
.tag.over{background:var(--red)}.tag.near{background:var(--amber)}.tag.done{background:var(--green)}
.detail-head h2{font-size:23px;line-height:1.3}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.df{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
.df .l{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:3px}
.df .v{font-size:15px;font-weight:500}
.df.full{grid-column:1/-1}
.detail-body{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow-sm)}
.detail-body h3{color:var(--navy);font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.detail-body .txt{font-size:15px;line-height:1.75;white-space:pre-wrap;color:#2a3340}
.backbtn{display:inline-flex;align-items:center;gap:7px;font:500 14px 'Kanit';color:var(--indigo);margin-bottom:16px;cursor:pointer}

#loader{position:fixed;inset:0;background:rgba(238,241,248,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;gap:16px}
.spin{width:42px;height:42px;border:4px solid #d3ddf0;border-top-color:var(--indigo);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loader .lt{font:500 16px 'Kanit';color:var(--navy)}

.scroll table{min-width:560px}
.scroll{-webkit-overflow-scrolling:touch}
@media(max-width:1024px){
  .wrap{padding:22px 18px 50px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr 1fr}
}
@media(max-width:920px){.kpis,.grid3{grid-template-columns:repeat(2,1fr)}.grid2,.detail-grid{grid-template-columns:1fr}}
@media(max-width:600px){
  .nav-top{padding:12px 16px;gap:10px}
  .seal{width:44px;height:44px}.seal span{font-size:9px}
  .brand h1{font-size:15px}.brand .s{font-size:11px}
  .nav-right{width:100%;order:3;gap:8px}
  .status{display:none}
  .refresh,.entrybtn{flex:1;justify-content:center;text-align:center;padding:11px 12px;font-size:14px}
  .menu-inner{padding:0 12px}.menu a{padding:12px 14px;font-size:14px}
  .wrap{padding:18px 14px 48px}
  .kpis,.grid3,.pub-stats,.sla-board{grid-template-columns:1fr}
  .kpi{padding:16px}.kpi .num{font-size:34px}
  .navcards,.dcards{grid-template-columns:1fr}
  .page-title{font-size:20px}
  .chart-box{height:260px}.chart-box.sm{height:240px}
  .card{padding:16px}
  .filters input,.filters select{flex:1 1 100%;min-width:0;padding:11px 13px;font-size:15px}
  .detail-grid{grid-template-columns:1fr}
  .detail-head{padding:22px 18px}.detail-head h2{font-size:20px}
  tbody td,thead th{padding:10px}
  .li{padding:13px}.backbtn{font-size:15px}
}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><div class="lt">กำลังดึงข้อมูลสดจาก Google Sheet…</div></div>

<header class="nav">
  <div class="nav-top">
    <div class="seal"><span>ศูนย์<br>ดำรงธรรม</span></div>

      <a class="entrybtn" href="entry.html">✏️ กรอกข้อมูล</a>

</header>

<div class="wrap">

  <div id="app"></div>
</div>

<script>

/* ---------- data ---------- */
function jsonp(params){
  return new Promise((res,rej)=>{
    const cb='cb_'+Date.now()+Math.floor(Math.random()*9999);
    const url=API+'?'+Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&')+'&callback='+cb;
    const s=document.createElement('script');
    const t=setTimeout(()=>{cln();rej('หมดเวลาเชื่อมต่อ');},25000);
    function cln(){clearTimeout(t);delete window[cb];s.remove();}
    window[cb]=d=>{cln();res(d);};
    s.onerror=()=>{cln();rej('เชื่อมต่อไม่ได้');};
    s.src=url;document.body.appendChild(s);
  });
}
function parseBE(s){if(!s)return null;const p=String(s).split('/');if(p.length!==3)return null;const dt=new Date(+p[2]-543,+p[1]-1,+p[0]);return isNaN(dt)?null:dt;}
function slaOf(r){
  if(r.status==='ยุติแล้ว')return{k:'done',days:null};
  const dl=parseBE(r.deadline);if(!dl)return{k:'ok',days:null};
  const diff=Math.round((dl-now)/86400000);
  if(diff<0)return{k:'over',days:diff};if(diff<=7)return{k:'near',days:diff};return{k:'ok',days:diff};
}
function ageOf(r){const d=parseBE(r.dateIn);if(!d)return null;return Math.round((now-d)/86400000);}
function count(arr,key){const m={};arr.forEach(r=>{const v=(r[key]||'').toString().trim();if(v)m[v]=(m[v]||0)+1;});return m;}
function districtList(){
  const set=[...new Set(RECORDS.map(r=>r.district))];
  return set.sort((a,b)=>{
    const ia=PREFERRED.findIndex(p=>a.indexOf(p)>=0), ib=PREFERRED.findIndex(p=>b.indexOf(p)>=0);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function useEmbedded(reason){
  RECORDS=(EMBEDDED.records||[]).map((r,i)=>(r._id=i,r));
  CONSUMER=(EMBEDDED.consumer||[]).map((r,i)=>(r._id=i,r));
  SUMMARY={}; UPDATED='ชุดข้อมูลในระบบ';
  document.getElementById('loader').style.display='none';
  document.getElementById('status').innerHTML='<span class="live-dot"></span>ข้อมูลในระบบ ('+RECORDS.length+' เรื่อง)';
  const b=document.getElementById('banner');
  if(reason){ b.style.display='block';
    b.innerHTML='ℹ️ กำลังแสดง<b>ข้อมูลที่ฝังไว้ในระบบ</b> (ยังเชื่อมต่อข้อมูลสดจาก Google Sheet ไม่ได้: '+esc(reason)+') — เมื่อตั้งค่า GAS เสร็จ ระบบจะดึงสดอัตโนมัติ'; }
  router();
}
async function load(){
  try{
    const d=await jsonp({action:'all'});
    if(!d.ok) throw d.error||'ผิดพลาด';
    if(!d.records || !d.records.length) throw 'ไม่พบข้อมูลในชีต';
    RECORDS=d.records.map((r,i)=>(r._id=i,r));
    CONSUMER=(d.consumer||[]).map((r,i)=>(r._id=i,r));
    SUMMARY=d.summary||{}; UPDATED=d.updated||'';
    document.getElementById('loader').style.display='none';
    const sheetTxt=(SUMMARY.sheets||[]).length?` · ${SUMMARY.sheets.length} ชีต`:'';
    document.getElementById('status').innerHTML=`<span class="live-dot"></span>ข้อมูลสด ${esc(UPDATED)}${sheetTxt}`;
    document.getElementById('banner').style.display='none';
    router();
  }catch(e){
    useEmbedded(e);
  }
}
function reload(){
  Object.values(charts).forEach(c=>c&&c.destroy());charts={};
  document.getElementById('loader').style.display='flex';
  load();
}

/* ---------- router ---------- */
function router(){
  Object.values(charts).forEach(c=>c&&c.destroy());charts={};
  const raw=(location.hash||'#home').slice(1);
  const [path,arg]=raw.split('/');
  document.querySelectorAll('#menu a').forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+(path||'home')));
  const app=document.getElementById('app');
  if(path==='case'){ app.innerHTML=viewCase(+arg); afterCase(); }
  else if(path==='cdetail'){ app.innerHTML=viewConsumerDetail(+arg); }
  else if(path==='cases'){ app.innerHTML=viewCases(arg?decodeURIComponent(arg):''); afterCases(); }
  else if(path==='districts'){ app.innerHTML=viewDistricts(); afterDistricts(); }
  else if(path==='urgent'){ app.innerHTML=viewUrgent(); }
  else if(path==='consumer'){ app.innerHTML=viewConsumer(); afterConsumer(); }
  else { app.innerHTML=viewHome(); afterHome(); }
  window.scrollTo(0,0);
}
window.addEventListener('hashchange',router);
function go(h){location.hash='#'+h;}

  return `
  <h2 class="page-title">ภาพรวมการดำเนินงาน</h2>
  <p class="page-sub">สรุปสถานะเรื่องร้องเรียนร้องทุกข์ทั้งจังหวัด · ข้อมูลสด ${esc(UPDATED)}</p>
  <div class="kpis">
    <div class="kpi k1"><div class="lab">เรื่องทั้งหมด</div><div class="num">${total}</div><div class="foot">${districtList().length} อำเภอ</div></div>
    <div class="kpi k2"><div class="lab">ยุติแล้ว</div><div class="num">${done}</div><div class="foot">${total?(done/total*100).toFixed(1):0}% ของทั้งหมด</div></div>
    <div class="kpi k3"><div class="lab">อยู่ระหว่างดำเนินการ</div><div class="num">${prog}</div><div class="foot">ยังติดตามอยู่</div></div>
    <div class="kpi k4"><div class="lab">เกินกำหนดรายงาน</div><div class="num">${over}</div><div class="foot">+ ใกล้ครบ ${near} เรื่อง</div></div>
  </div>
  <div class="navcards">
    <div class="navcard" onclick="go('cases')"><div class="ic">📋</div><div><div class="t">ทะเบียนเรื่องทั้งหมด</div><div class="d">ค้นหา/กรอง แล้วคลิกดูรายละเอียด</div></div></div>
    <div class="navcard" onclick="go('urgent')"><div class="ic">⚠️</div><div><div class="t">เรื่องเร่งรัด ${over+near}</div><div class="d">เกิน/ใกล้ครบกำหนดรายงาน</div></div></div>
    <div class="navcard" onclick="go('districts')"><div class="ic">🗺️</div><div><div class="t">รายอำเภอ</div><div class="d">เปรียบเทียบผลงานรายพื้นที่</div></div></div>
    <div class="navcard" onclick="go('consumer')"><div class="ic">⚖️</div><div><div class="t">คุ้มครองผู้บริโภค ${CONSUMER.length}</div><div class="d">งานแยกต่างหาก</div></div></div>
    <div class="navcard" onclick="location.href='entry.html'" style="border-color:var(--gold);background:linear-gradient(135deg,#fff,#fdf9ee)"><div class="ic" style="background:#f6ecc8">✏️</div><div><div class="t">กรอก / แก้ไขข้อมูล</div><div class="d">เพิ่มเรื่องใหม่หรือปรับสถานะ (ใช้ PIN)</div></div></div>
  </div>
  <div class="grid2">
    <div class="card"><h3>เปรียบเทียบรายอำเภอ</h3><div class="chart-box"><canvas id="cDist"></canvas></div></div>
    <div class="card"><h3>เรื่องรับเข้าล่าสุด</h3><div class="minilist">${recentList()}</div></div>
  </div>
  <div class="grid3">
    <div class="card"><h3>ตามประเภทเรื่อง</h3><div class="chart-box sm"><canvas id="cType"></canvas></div></div>
    <div class="card"><h3>ตามช่องทาง</h3><div class="chart-box sm"><canvas id="cCh"></canvas></div></div>
    <div class="card"><h3>ความสำเร็จในการยุติเรื่อง</h3><div class="chart-box sm"><canvas id="cDonut"></canvas></div></div>
  </div>`;
}
function recentList(){
  const sorted=[...RECORDS].filter(r=>parseBE(r.dateIn)).sort((a,b)=>parseBE(b.dateIn)-parseBE(a.dateIn)).slice(0,7);
  if(!sorted.length) return '<div class="empty">—</div>';
  return sorted.map(r=>`<div class="li" onclick="go('case/${r._id}')"><span class="badge new">${esc(r.dateIn)}</span><div><div class="t">${esc(r.title)}</div><div class="m">${esc(r.district)} · ${esc(r.type||'')}</div></div></div>`).join('');
}
function afterHome(){
  Chart.defaults.font.family='Sarabun';Chart.defaults.color='#6b7686';
  const dl=districtList();
  const done=dl.map(d=>RECORDS.filter(r=>r.district===d&&r.status==='ยุติแล้ว').length);
  const prog=dl.map(d=>RECORDS.filter(r=>r.district===d&&r.status!=='ยุติแล้ว').length);
  charts.d=new Chart(cDist,{type:'bar',data:{labels:dl,datasets:[
    {label:'ยุติแล้ว',data:done,backgroundColor:'#1f9d6b',borderRadius:6},
    {label:'ดำเนินการ',data:prog,backgroundColor:'#e0a000',borderRadius:6}]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true}}}});
  const tc=count(RECORDS,'type'),tl=Object.keys(tc);
  charts.t=new Chart(cType,{type:'doughnut',data:{labels:tl,datasets:[{data:tl.map(t=>tc[t]),backgroundColor:tl.map(t=>TYPE_COLORS[t]||'#999'),borderWidth:2,borderColor:'#fff'}]},options:{maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{boxWidth:11,font:{size:10.5}}}}}});
  const cc=count(RECORDS,'channel'),cl=Object.keys(cc).sort((a,b)=>cc[b]-cc[a]);
  charts.c=new Chart(cCh,{type:'bar',data:{labels:cl,datasets:[{data:cl.map(c=>cc[c]),backgroundColor:'#24508f',borderRadius:6}]},options:{maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:'#eef1f7'}},y:{grid:{display:false}}}}});
  const done2=RECORDS.filter(r=>r.status==='ยุติแล้ว').length;
  charts.o=new Chart(cDonut,{type:'doughnut',data:{labels:['ยุติแล้ว','ดำเนินการ'],datasets:[{data:[done2,RECORDS.length-done2],backgroundColor:['#1f9d6b','#e0a000'],borderWidth:3,borderColor:'#fff'}]},options:{maintainAspectRatio:false,cutout:'70%',plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} (${(c.raw/RECORDS.length*100).toFixed(1)}%)`}}}}});
}

/* ---------- CASES ---------- */
function viewCases(preDistrict){
  const dl=districtList();
  return `
  <h2 class="page-title">ทะเบียนเรื่องร้องเรียน</h2>
  <p class="page-sub">คลิกที่เรื่องเพื่อดูรายละเอียดทั้งหมดที่บันทึกไว้</p>
  <div class="filters">
    <input id="q" placeholder="🔍 ค้นหาชื่อเรื่อง / ผู้ร้อง / หน่วยงาน...">
    <select id="fd"><option value="">ทุกอำเภอ</option>${dl.map(d=>`<option ${d===preDistrict?'selected':''}>${esc(d)}</option>`).join('')}</select>
    <select id="ft"><option value="">ทุกประเภท</option>${[...new Set(RECORDS.map(r=>r.type))].filter(Boolean).map(t=>`<option>${esc(t)}</option>`).join('')}</select>
    <select id="fs"><option value="">ทุกสถานะ</option><option>อยู่ระหว่างดำเนินการ</option><option>ยุติแล้ว</option></select>
    <select id="fl"><option value="">ทุก SLA</option><option value="over">เกินกำหนด</option><option value="near">ใกล้ครบกำหนด</option></select>
  </div>
  <div class="table-wrap"><div class="scroll"><table>
    <thead><tr><th>เรื่อง</th><th>อำเภอ</th><th>ประเภท</th><th>ผู้ร้องเรียน</th><th>กำหนดรายงาน</th><th>สถานะ</th></tr></thead>
    <tbody id="tb"></tbody></table></div></div>
  <div class="note" id="cnt"></div>`;
}
function afterCases(){
  const q=document.getElementById('q'),fd=document.getElementById('fd'),ft=document.getElementById('ft'),fs=document.getElementById('fs'),fl=document.getElementById('fl');
  function draw(){
    const rows=RECORDS.filter(r=>{
      const t=q.value.trim();
      if(t&&!((r.title||'').includes(t)||(r.complainant||'').includes(t)||(r.agency||'').includes(t)))return false;
      if(fd.value&&r.district!==fd.value)return false;
      if(ft.value&&r.type!==ft.value)return false;
      if(fs.value&&r.status!==fs.value)return false;
      if(fl.value&&slaOf(r).k!==fl.value)return false;
      return true;
    });
    document.getElementById('tb').innerHTML=rows.length?rows.map(r=>{
      const s=slaOf(r);let cls='ok',txt=r.deadline||'—';
      if(s.k==='over'){cls='over';txt=`${r.deadline} (เกิน ${Math.abs(s.days)} วัน)`;}
      else if(s.k==='near'){cls='near';txt=`${r.deadline} (อีก ${s.days} วัน)`;}
      const sc=r.status==='ยุติแล้ว'?'done':'prog';
      return `<tr onclick="go('case/${r._id}')"><td class="ttl">${esc(r.title)}</td><td>${esc(r.district)}</td><td>${esc(r.type||'')}</td><td>${esc(r.complainant||'')}</td><td class="dl ${cls}">${esc(txt)}</td><td><span class="st ${sc}">${esc(r.status||'')}</span></td></tr>`;
    }).join(''):'<tr><td colspan="6" class="empty">ไม่พบเรื่องที่ตรงกับตัวกรอง</td></tr>';
    document.getElementById('cnt').textContent=`แสดง ${rows.length} จาก ${RECORDS.length} เรื่อง`;
  }
  [q,fd,ft,fs,fl].forEach(el=>el.addEventListener('input',draw));draw();
}

/* ---------- DISTRICTS ---------- */
function viewDistricts(){
  const dl=districtList();
  const cards=dl.map(d=>{
    const all=RECORDS.filter(r=>r.district===d);
    const done=all.filter(r=>r.status==='ยุติแล้ว').length, prog=all.length-done;
    const pd=all.length?done/all.length*100:0;
    return `<div class="dcard" onclick="go('cases/${encodeURIComponent(d)}')">
      <h4>${esc(d)}</h4><div class="big">${all.length}</div>
      <div class="bar"><div class="seg done" style="width:${pd}%"></div><div class="seg prog" style="width:${100-pd}%"></div></div>
      <div class="legend"><span><span class="dot done"></span>ยุติ ${done}</span><span><span class="dot prog"></span>ดำเนินการ ${prog}</span></div>
    </div>`;
  }).join('');
  return `<h2 class="page-title">ผลการดำเนินงานรายอำเภอ</h2>
  <p class="page-sub">คลิกอำเภอเพื่อดูรายการเรื่องของพื้นที่นั้น</p>
  <div class="dcards">${cards}</div>
  <div class="card"><h3>เปรียบเทียบประเภทเรื่องรายอำเภอ</h3><div class="chart-box"><canvas id="cDT"></canvas></div></div>`;
}
function afterDistricts(){
  Chart.defaults.font.family='Sarabun';
  const dl=districtList();const types=Object.keys(count(RECORDS,'type'));
  const ds=types.map(t=>({label:t,data:dl.map(d=>RECORDS.filter(r=>r.district===d&&r.type===t).length),backgroundColor:TYPE_COLORS[t]||'#999',borderRadius:4}));
  charts.dt=new Chart(cDT,{type:'bar',data:{labels:dl,datasets:ds},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:11,font:{size:11}}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true}}}});
}

/* ---------- URGENT ---------- */
function viewUrgent(){
  const list=RECORDS.map(r=>({r,s:slaOf(r)})).filter(x=>x.s.k==='over'||x.s.k==='near').sort((a,b)=>(a.s.days??0)-(b.s.days??0));
  const items=list.length?list.map(({r,s})=>{
    const ov=s.k==='over';const lab=ov?`เกิน ${Math.abs(s.days)} วัน`:`อีก ${s.days} วัน`;
    return `<div class="li" onclick="go('case/${r._id}')"><span class="badge ${ov?'over':'near'}">${lab}</span><div><div class="t">${esc(r.title)}</div><div class="m">${esc(r.district)} · ${esc(r.agency||'')} · กำหนด ${esc(r.deadline||'-')}</div></div></div>`;
  }).join(''):'<div class="empty">ไม่มีเรื่องเกิน/ใกล้ครบกำหนด 🎉</div>';
  return `<h2 class="page-title">⚠️ เรื่องที่ต้องเร่งรัด</h2>
  <p class="page-sub">เรียงตามความเร่งด่วน (เกินกำหนดก่อน) · คลิกเพื่อดูรายละเอียด</p>
  <div class="card"><div class="minilist" style="max-height:none">${items}</div></div>`;
}

/* ---------- CONSUMER ---------- */
function viewConsumer(){
  const done=CONSUMER.filter(r=>r.status==='ยุติแล้ว').length;
  return `<h2 class="page-title">งานคุ้มครองผู้บริโภค</h2>
  <p class="page-sub">แยกตัวชี้วัดจากเรื่องร้องเรียนทั่วไป · คลิกเพื่อดูรายละเอียด</p>
  <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi k1"><div class="lab">ทั้งหมด</div><div class="num">${CONSUMER.length}</div></div>
    <div class="kpi k2"><div class="lab">ยุติแล้ว</div><div class="num">${done}</div></div>
    <div class="kpi k3"><div class="lab">อยู่ระหว่างดำเนินการ</div><div class="num">${CONSUMER.length-done}</div></div>
  </div>
  <div class="filters"><input id="cq" placeholder="🔍 ค้นหา..."></div>
  <div class="table-wrap"><div class="scroll"><table>
    <thead><tr><th>เรื่อง</th><th>ผู้ร้องเรียน</th><th>ผู้ถูกร้องเรียน</th><th>วันที่ร้อง</th><th>กำหนดรายงาน</th><th>สถานะ</th></tr></thead>
    <tbody id="ctb"></tbody></table></div></div>`;
}
function afterConsumer(){
  const cq=document.getElementById('cq');
  function draw(){
    const t=cq.value.trim();
    const rows=CONSUMER.filter(r=>!t||JSON.stringify(r).includes(t));
    document.getElementById('ctb').innerHTML=rows.length?rows.map(r=>{
      const sc=r.status==='ยุติแล้ว'?'done':'prog';
      return `<tr onclick="go('cdetail/${r._id}')"><td class="ttl">${esc(r.title)}</td><td>${esc(r.complainant||'')}</td><td>${esc(r.accused||'')}</td><td>${esc(r.dateIn||'')}</td><td>${esc(r.deadline||'')}</td><td><span class="st ${sc}">${esc(r.status||'')}</span></td></tr>`;
    }).join(''):'<tr><td colspan="6" class="empty">ไม่มีข้อมูล</td></tr>';
  }
  cq.addEventListener('input',draw);draw();
}

/* ---------- CASE DETAIL (view only) ---------- */
function viewCase(id){
  const r=RECORDS.find(x=>x._id===id);
  if(!r) return `<div class="card empty">ไม่พบเรื่องนี้ <br><br><span class="backbtn" onclick="go('cases')">← กลับทะเบียนเรื่อง</span></div>`;
  const s=slaOf(r), age=ageOf(r);
  let slaTag='';
  if(s.k==='over') slaTag=`<span class="tag over">เกินกำหนด ${Math.abs(s.days)} วัน</span>`;
  else if(s.k==='near') slaTag=`<span class="tag near">ใกล้ครบกำหนด อีก ${s.days} วัน</span>`;
  else if(r.status==='ยุติแล้ว') slaTag=`<span class="tag done">ยุติแล้ว</span>`;
  const f=(l,v)=>`<div class="df"><div class="l">${l}</div><div class="v">${esc(v||'—')}</div></div>`;
  return `
  <span class="backbtn" onclick="go('cases')">← กลับทะเบียนเรื่อง</span>
  <div class="detail-head">
    <div class="tags"><span class="tag">${esc(r.district)}</span><span class="tag">${esc(r.type||'ไม่ระบุประเภท')}</span>${slaTag}</div>
    <h2>${esc(r.title)}</h2>
  </div>
  <div class="detail-grid">
    ${f('ผู้ร้องเรียน',r.complainant)}
    ${f('ผู้ถูกร้องเรียน',r.accused)}
    ${f('ประเภทเรื่อง',r.type)}
    ${f('ช่องทางการรับเรื่อง',r.channel)}
    ${f('หน่วยงานรับผิดชอบ',r.agency)}
    ${f('สถานะ',r.status)}
    ${f('วันที่ร้องเรียน',r.dateIn)}
    ${f('กำหนดรายงาน',r.deadline)}
    ${f('การเร่งรัด',r.urge)}
    ${f('อายุเรื่อง',age!=null?`เปิดมาแล้ว ${age} วัน`:'—')}
  </div>
  <div class="detail-body">
    <h3>📝 รายละเอียดที่บันทึกไว้</h3>
    <div class="txt">${esc(r.detail)||'<span style="color:#9aa4b2">— ไม่มีการบันทึกรายละเอียด —</span>'}</div>
  </div>`;
}
function afterCase(){}

function viewConsumerDetail(id){
  const r=CONSUMER.find(x=>x._id===id);
  if(!r) return `<div class="card empty">ไม่พบเรื่องนี้ <br><br><span class="backbtn" onclick="go('consumer')">← กลับ</span></div>`;
  const f=(l,v)=>`<div class="df"><div class="l">${l}</div><div class="v">${esc(v||'—')}</div></div>`;
  const sc=r.status==='ยุติแล้ว'?'done':'';
  return `
  <span class="backbtn" onclick="go('consumer')">← กลับงานคุ้มครองผู้บริโภค</span>
  <div class="detail-head">
    <div class="tags"><span class="tag">คุ้มครองผู้บริโภค</span><span class="tag ${sc}">${esc(r.status||'')}</span></div>
    <h2>${esc(r.title)}</h2>
  </div>
  <div class="detail-grid">
    ${f('ผู้ร้องเรียน',r.complainant)}
    ${f('ผู้ถูกร้องเรียน',r.accused)}
    ${f('วันที่ร้องเรียน',r.dateIn)}
    ${f('กำหนดรายงาน',r.deadline)}
    ${f('สถานะ',r.status)}
    ${f('หมายเหตุ',r.note)}
  </div>
  <div class="detail-body"><h3>📝 รายละเอียดที่บันทึกไว้</h3>
    <div class="txt">${esc(r.detail)||'<span style="color:#9aa4b2">— ไม่มีการบันทึกรายละเอียด —</span>'}</div></div>`;
}

load();
</script>
</body>
</html>
